# ===== 이벤트 처리 설정 (필수 블록) =====
events {
    worker_connections 1024;
}

http {
    # ── HTTP(80) → HTTPS(443) 리다이렉트 ──
    server {
        listen       80;
        server_name www.timotimo.shop;

        # 인증서 갱신 챌린지 경로는 리다이렉트 예외
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }
    # ── HTTPS(443) 메인 서버 ──
    server {
        listen 443 ssl;
        server_name www.timotimo.shop;

        ssl_certificate     /etc/letsencrypt/live/www.timotimo.shop/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/www.timotimo.shop/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # React 정적 파일 (SPA 라우팅)
        location / {
            root  /usr/share/nginx/html;
            index index.html;
            try_files $uri /index.html;
        }

        # ===== ① API 요청 → Spring Boot 컨테이너로 프록시 =====
        # / 로 시작하는 요청은 정적 파일이 아니라 백엔드로 전달
        location /bn/ {
            # 같은 Docker 네트워크의 컨테이너 이름으로 접근
            # (nginx 컨테이너와 bn-container가 같은 my-network에 있어야 함)
            proxy_pass http://bn-container:8080/;

            # 원래 요청의 정보를 백엔드에 전달 (로그, 인증 등에 필요)
            proxy_set_header Host $host;                          # 원래 요청의 Host
            proxy_set_header X-Real-IP $remote_addr;              # 실제 클라이언트 IP
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 프록시 경유 IP 목록
            proxy_set_header X-Forwarded-Proto $scheme;           # http/https 여부
        }

        error_page  500 502 503 504 /50x.html;
        location = /50x.html {
            root   /usr/share/nginx/html;
        }
    }
}